<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background gradient (PatientRank brand: deep navy → vibrant blue) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1B3D"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="120" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background (Google app icon style) -->
  <rect x="0" y="0" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="30" x2="120" y2="30"/>
    <line x1="0" y1="60" x2="120" y2="60"/>
    <line x1="0" y1="90" x2="120" y2="90"/>
    <line x1="30" y1="0" x2="30" y2="120"/>
    <line x1="60" y1="0" x2="60" y2="120"/>
    <line x1="90" y1="0" x2="90" y2="120"/>
  </g>

  <!-- Ranking bar chart (3 ascending bars = SEO ranking growth) -->
  <g filter="url(#glow)">
    <rect x="22" y="74" width="14" height="22" rx="3" fill="url(#bar)" opacity="0.85"/>
    <rect x="42" y="58" width="14" height="38" rx="3" fill="url(#bar)" opacity="0.92"/>
    <rect x="62" y="38" width="14" height="58" rx="3" fill="url(#bar)"/>
  </g>

  <!-- Upward trend arrow (rank up) -->
  <g filter="url(#glow)">
    <path d="M 28 72 L 49 56 L 69 38 L 90 24" fill="none" stroke="url(#trend)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head -->
    <path d="M 90 24 L 82 26 L 88 32 Z" fill="#FBBF24"/>
  </g>

  <!-- Medical cross dot (pulse marker on top of growth) -->
  <g transform="translate(90 24)">
    <circle r="7" fill="#FFFFFF" opacity="0.95"/>
    <rect x="-3.5" y="-1" width="7" height="2" rx="0.5" fill="#1E40AF"/>
    <rect x="-1" y="-3.5" width="2" height="7" rx="0.5" fill="#1E40AF"/>
  </g>

  <!-- "PR" monogram subtle bottom-left -->
  <text x="14" y="110" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#FFFFFF" opacity="0.55" letter-spacing="1">PR</text>
</svg>
